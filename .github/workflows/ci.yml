name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  checks:
    name: Typecheck, lint, unit tests, build
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_ANON_KEY: ci-anon-key
      VITE_SUPABASE_URL: http://127.0.0.1:54321
      VITE_SUPABASE_ANON_KEY: ci-anon-key
      VITE_BFF_URL: /api
      VITE_ENABLE_DEV_AUTO_LOGIN: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test domain
        run: npm run test --workspace @wos/domain

      - name: Test BFF
        run: npm run test --workspace @wos/bff

      - name: Test web
        run: npm run test --workspace @wos/web

      - name: Build
        run: npm run build
