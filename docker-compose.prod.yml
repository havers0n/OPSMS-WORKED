services:
  bff:
    image: ${BFF_IMAGE:-ghcr.io/havers0n/opsms-worked/bff:latest}
    env_file:
      - ${BFF_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      BFF_HOST: 0.0.0.0
      BFF_PORT: 8787
    expose:
      - "8787"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8787/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    image: ${WEB_IMAGE:-ghcr.io/havers0n/opsms-worked/web:latest}
    depends_on:
      - bff
    ports:
      - "${WEB_PORT:-8080}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
